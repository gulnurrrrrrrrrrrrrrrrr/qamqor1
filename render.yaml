databases:
  - name: qamqor-db
    plan: free
    databaseName: qamqor
    user: qamqor

services:
  - type: web
    name: qamqor-ai
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qamqor-db
          property: connectionString
      - key: NODE_ENV
        value: production
    healthCheckPath: /
